name: finlit
description: "Financial Literacy App for Teens - Learn money management basics."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  cloud_firestore: ^5.4.4
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  fl_chart: ^0.70.2
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.3.4

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/res/
